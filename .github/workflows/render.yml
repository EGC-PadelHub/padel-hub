name: Deploy to Render

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  testing:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: padelhub_root_password
          MYSQL_DATABASE: padelhubdb_test
          MYSQL_USER: padelhub_user
          MYSQL_PASSWORD: padelhub_password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      env:
        FLASK_ENV: testing
        MARIADB_HOSTNAME: 127.0.0.1
        MARIADB_PORT: 3306
        MARIADB_TEST_DATABASE: padelhubdb_test
        MARIADB_USER: padelhub_user
        MARIADB_PASSWORD: padelhub_password
      run: |
        pytest app/modules/ --ignore-glob='*selenium*'

  detect-version-bump:
    name: Detect Version Bump Type
    runs-on: ubuntu-latest
    needs: testing
    # CONDICIÓN CORREGIDA
    if: ${{ needs.testing.result == 'success' }}
    
    outputs:
      version_bump: ${{ steps.detect.outputs.bump_type }}
    
    steps:
    - name: Checkout code with full history
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Detect version bump from commit message
      id: detect
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%B)
        echo "Commit message: $COMMIT_MSG"
        
        if [[ "$COMMIT_MSG" =~ [Ff]ix ]]; then
          echo "🔧 Detected 'fix' in commit message - will bump MINOR version"
          echo "bump_type=minor" >> $GITHUB_OUTPUT
        else
          echo "🚀 No 'fix' detected - will bump MAJOR version (default)"
          echo "bump_type=major" >> $GITHUB_OUTPUT
        fi

  create-release-tag:
    name: Create Release Tag
    runs-on: ubuntu-latest
    needs: [testing, detect-version-bump]
    # CONDICIÓN CORREGIDA
    if: ${{ needs.testing.result == 'success' && needs.detect-version-bump.result == 'success' }}
    
    steps:
    - name: Checkout code with full history
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        fetch-depth: 0

    - name: Get latest tag and increment version
      id: versioning
      run: |
        git fetch --tags
        echo "Available tags:"
        git tag -l
        
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag: $LATEST_TAG"
        echo "Bump type: ${{ needs.detect-version-bump.outputs.version_bump }}"
        
        if [[ $LATEST_TAG =~ v([0-9]+)\.([0-9]+)\.([0-9]+) ]]; then
          MAJOR=${BASH_REMATCH[1]}
          MINOR=${BASH_REMATCH[2]}
          PATCH=${BASH_REMATCH[3]}
          
          if [[ "${{ needs.detect-version-bump.outputs.version_bump }}" == "minor" ]]; then
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="$MAJOR.$NEW_MINOR.0"
            NEW_TAG="v$NEW_VERSION"
            echo "Incrementing MINOR version: $LATEST_TAG → $NEW_TAG"
          else
            NEW_MAJOR=$((MAJOR + 1))
            NEW_VERSION="$NEW_MAJOR.0.0"
            NEW_TAG="v$NEW_VERSION"
            echo "Incrementing MAJOR version: $LATEST_TAG → $NEW_TAG"
          fi
        else
          NEW_TAG="v1.0.0"
          echo "No valid previous tag found, starting with: $NEW_TAG"
        fi
        
        echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Create and push new tag
      run: |
        echo "Creating new release tag: ${{ steps.versioning.outputs.new_tag }}"
        git config user.name "GitHub CD Action"
        git config user.email "actions@github.com"
        git tag -a "${{ steps.versioning.outputs.new_tag }}" -m "Release ${{ steps.versioning.outputs.new_tag }} - ${{ needs.detect-version-bump.outputs.version_bump }} version bump"
        git push origin "${{ steps.versioning.outputs.new_tag }}"
        echo "🎉 Successfully created and pushed ${{ steps.versioning.outputs.new_tag }}"

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest  # ← ESTA LÍNEA FALTABA
    needs: [testing, create-release-tag]
    # CONDICIÓN CORREGIDA
    if: ${{ needs.testing.result == 'success' && needs.create-release-tag.result == 'success' }}
    
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Determine deployed version
        run: |
          echo "🚀 Deploying RELEASE: ${{ needs.create-release-tag.outputs.new_tag }}"
          echo "Bump type: ${{ needs.detect-version-bump.outputs.version_bump }}"

      - name: Deploy to Render
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          echo "Triggering deployment to Render..."
          response=$(curl -s -o response.txt -w "%{http_code}" "$deploy_url")
          if [ "$response" -eq 200 ]; then
            echo "✅ Deployment triggered successfully"
            cat response.txt
          else
            echo "❌ Deployment failed with HTTP $response"
            cat response.txt
            exit 1
          fi
